<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 페이지 | BullBoard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/overrides.css?v=8">
    <link rel="stylesheet" href="/css/mypage.css?v=2">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">B</span> BullBoard</a>
    <nav>
        <a href="/#markets">시장</a>
        <a href="/mypage" aria-current="page">내 페이지</a>
        <a href="/posts">커뮤니티</a>
    </nav>
    <button class="text-button" id="logoutButton" hidden>로그아웃</button>
</header>

<main class="mypage-shell">
    <section class="state-card" id="loadingState">
        <p>회원 정보를 불러오고 있습니다.</p>
    </section>

    <section class="state-card" id="loginRequired" hidden>
        <p class="eyebrow">MY PAGE</p>
        <h1>로그인이 필요합니다</h1>
        <p>내 페이지는 로그인한 회원만 이용할 수 있습니다.</p>
        <a class="primary-button inline-button" href="/">홈에서 로그인하기</a>
    </section>

    <div id="memberContent" hidden>
        <section class="profile-hero">
            <div class="avatar" id="profileInitial">B</div>
            <div>
                <p class="eyebrow">MY PAGE</p>
                <h1><span id="welcomeNickname"></span>님의 페이지</h1>
                <p id="profileIntroduction">소개를 작성해 나를 표현해 보세요.</p>
            </div>
        </section>

        <div class="mypage-grid">
            <section class="mypage-card profile-card">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">PROFILE</p>
                        <h2>회원정보 수정</h2>
                    </div>
                </div>

                <form id="profileForm">
                    <label>
                        이메일
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </label>
                    <label>
                        닉네임
                        <input type="text" id="nickname" name="nickname" maxlength="50" required>
                    </label>
                    <label>
                        내 소개
                        <textarea id="introduction" name="introduction" maxlength="200"
                                  placeholder="나를 소개하는 글을 입력하세요."></textarea>
                        <span class="character-count"><span id="introductionCount">0</span>/200</span>
                    </label>
                    <label>
                        새 비밀번호 <span class="optional">선택 사항</span>
                        <input type="password" id="password" name="password"
                               autocomplete="new-password"
                               placeholder="변경할 때만 입력하세요.">
                    </label>
                    <label>
                        새 비밀번호 확인
                        <input type="password" id="passwordConfirm" name="passwordConfirm"
                               autocomplete="new-password">
                    </label>
                    <p class="form-help">비밀번호는 영문, 숫자, 특수문자를 포함해 8자 이상이어야 합니다.</p>
                    <button class="primary-button" type="submit">변경사항 저장</button>
                </form>
            </section>

            <section class="mypage-card articles-card">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">ACTIVITY</p>
                        <h2>내가 쓴 글</h2>
                    </div>
                    <a class="write-link" href="/posts?write=true">글쓰기</a>
                </div>
                <div class="my-article-list" id="myArticleList"></div>
                <nav class="mypage-pagination" id="myArticlePagination"
                     aria-label="내가 쓴 글 페이지"></nav>
            </section>
        </div>

        <section class="mypage-card danger-zone">
            <div>
                <p class="eyebrow danger-eyebrow">ACCOUNT</p>
                <h2>회원탈퇴</h2>
                <p>탈퇴 후 작성한 게시글과 댓글은 ‘알 수 없음’ 작성자로 남습니다.</p>
            </div>
            <button class="danger-button" id="deleteMemberButton" type="button">회원탈퇴</button>
        </section>
    </div>
</main>

<div class="toast" id="toast"></div>
<script src="/js/mypage.js?v=2"></script>
</body>
</html>
