<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BullBoard | 커뮤니티</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        :root { --ink:#12191b; --muted:#687376; --line:#dce3e0; --paper:#f7f8f6; --green:#12a974; --red:#e35c59; }
        * { box-sizing:border-box; }
        body { margin:0; background:var(--paper); color:var(--ink); font-family:Arial,sans-serif; }
        button,input,textarea,select { font:inherit; }
        button { cursor:pointer; }
        .topbar { height:76px; display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:auto; border-bottom:1px solid var(--line); }
        .brand { color:var(--ink); text-decoration:none; font-size:20px; font-weight:800; }
        .brand-mark { display:inline-grid; place-items:center; width:27px; height:27px; margin-right:7px; border-radius:8px; background:var(--green); color:#fff; font:italic 700 18px Georgia,serif; }
        .page-nav { display:flex; align-items:center; gap:26px; margin-left:auto; }
        .page-nav a { color:var(--muted); text-decoration:none; font-size:14px; font-weight:700; }
        .page-nav a[aria-current="page"] { color:var(--green); }
        .home-link { color:var(--muted); text-decoration:none; font-size:14px; font-weight:700; }
        .layout { max-width:1180px; margin:44px auto 80px; display:grid; grid-template-columns:230px 1fr; gap:34px; }
        .sidebar,.content { background:#fff; border:1px solid var(--line); border-radius:14px; }
        .sidebar { padding:22px; align-self:start; }
        .sidebar h2 { margin:0 0 17px; font-size:17px; }
        .board-list { display:grid; gap:7px; }
        .board-button { width:100%; padding:11px 12px; border:0; border-radius:8px; background:transparent; color:var(--muted); text-align:left; }
        .board-button.active { background:#e1f5eb; color:#087d56; font-weight:800; }
        .content { min-height:560px; padding:30px; }
        .content-head { display:flex; justify-content:space-between; gap:20px; align-items:end; padding-bottom:22px; border-bottom:1px solid var(--line); }
        .eyebrow { margin:0 0 8px; color:var(--green); font-size:11px; font-weight:800; letter-spacing:1.4px; }
        h1 { margin:0; font-size:29px; }
        .primary { border:0; border-radius:8px; padding:11px 17px; background:var(--green); color:#fff; font-weight:800; }
        .search-form { display:flex; gap:8px; padding:18px 0 4px; }
        .search-form input { flex:1; min-width:0; padding:11px 13px; border:1px solid var(--line); border-radius:8px; }
        .search-form select { padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; }
        .search-form .symbol-filter { flex:0 0 105px; text-transform:uppercase; }
        .search-form button { padding:10px 16px; border:1px solid var(--line); border-radius:8px; background:#fff; font-weight:800; }
        .article-list { display:grid; }
        .article-row { display:grid; grid-template-columns:1fr auto; gap:18px; width:100%; padding:19px 4px; border:0; border-bottom:1px solid var(--line); background:transparent; text-align:left; }
        .article-row:hover { color:#087d56; }
        .article-title { display:block; margin-bottom:7px; font-size:16px; font-weight:800; }
        .symbol-tag { display:inline-block; margin-right:7px; padding:3px 7px; border-radius:999px; background:#e1f5eb; color:#087d56; font-size:11px; font-weight:800; }
        .article-meta,.article-date { color:var(--muted); font-size:12px; }
        .empty { padding:90px 20px; color:var(--muted); text-align:center; }
        .pagination { display:flex; justify-content:center; gap:6px; padding-top:24px; }
        .page-button { min-width:36px; height:36px; border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--muted); }
        .page-button.active { border-color:var(--green); background:var(--green); color:#fff; font-weight:800; }
        .page-button:disabled { opacity:.4; cursor:not-allowed; }
        .overlay { position:fixed; inset:0; display:none; place-items:center; padding:20px; background:#0c1614a6; z-index:20; }
        .overlay.visible { display:grid; }
        .modal { width:min(100%,650px); max-height:90vh; overflow:auto; padding:30px; border-radius:16px; background:#fff; position:relative; }
        .close { position:absolute; right:15px; top:12px; border:0; background:transparent; color:var(--muted); font-size:27px; }
        .detail-title { margin:7px 35px 10px 0; font-size:26px; }
        .detail-meta { padding-bottom:18px; border-bottom:1px solid var(--line); color:var(--muted); font-size:13px; }
        .detail-author { color:#087d56; font-weight:800; text-decoration:none; }
        .detail-author:hover { text-decoration:underline; }
        .detail-images { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; padding-top:20px; }
        .detail-images:empty { display:none; }
        .detail-images img { width:100%; max-height:420px; border-radius:10px; background:var(--paper); object-fit:contain; }
        .detail-images img:only-child { grid-column:1/-1; }
        .detail-content { min-height:190px; padding:24px 0; line-height:1.75; white-space:pre-wrap; }
        .detail-actions { display:flex; justify-content:flex-end; gap:8px; }
        .comments { margin-top:22px; padding-top:22px; border-top:1px solid var(--line); }
        .comments h3 { margin:0 0 15px; font-size:16px; }
        .comment-list { display:grid; gap:10px; }
        .comment { padding:13px; border-radius:9px; background:var(--paper); }
        .comment-head { display:flex; justify-content:space-between; gap:12px; color:var(--muted); font-size:12px; }
        .comment-content { margin:9px 0 0; line-height:1.55; white-space:pre-wrap; }
        .comment-actions { display:flex; justify-content:flex-end; gap:6px; margin-top:8px; }
        .comment-actions button { border:0; background:transparent; color:var(--muted); font-size:12px; font-weight:700; }
        .comment-edit { width:100%; min-height:76px; margin-top:9px; padding:10px; border:1px solid var(--green); border-radius:8px; resize:vertical; }
        .comment-form { display:flex; gap:8px; margin-top:14px; }
        .comment-form textarea { flex:1; min-height:66px; resize:vertical; padding:11px; border:1px solid var(--line); border-radius:8px; }
        .secondary,.danger { padding:9px 14px; border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--ink); font-weight:700; text-decoration:none; }
        .danger { border-color:#f1c3c2; color:var(--red); }
        .editor { display:grid; gap:16px; }
        .editor h2 { margin:0 0 4px; }
        .editor label { display:grid; gap:7px; font-size:12px; font-weight:800; }
        .editor input,.editor textarea,.editor select { padding:12px; border:1px solid var(--line); border-radius:8px; background:#fff; }
        .editor textarea { min-height:220px; resize:vertical; }
        .image-help { color:var(--muted); font-size:12px; font-weight:400; }
        .image-preview { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:9px; }
        .image-preview:empty { display:none; }
        .image-preview-item { position:relative; overflow:hidden; aspect-ratio:1; border:1px solid var(--line); border-radius:9px; background:var(--paper); }
        .image-preview-item img { width:100%; height:100%; object-fit:cover; }
        .image-preview-item button { position:absolute; right:5px; top:5px; width:27px; height:27px; padding:0; border:0; border-radius:50%; background:#172424d9; color:#fff; font-weight:800; }
        .editor-actions { display:flex; justify-content:flex-end; gap:8px; }
        .toast { position:fixed; left:50%; bottom:25px; opacity:0; transform:translate(-50%,20px); padding:12px 17px; border-radius:8px; background:#172424; color:#fff; font-size:13px; transition:.2s; pointer-events:none; z-index:30; }
        .toast.show { opacity:1; transform:translate(-50%,0); }
        @media(max-width:760px){
            body{overflow-x:hidden}.topbar{height:auto;min-height:76px;padding:13px 18px 11px;flex-wrap:wrap;gap:11px}.topbar .brand{order:1}.page-nav{order:3;display:grid;width:100%;margin:0;padding-top:10px;border-top:1px solid var(--line);grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.page-nav a{display:grid;min-height:39px;padding:8px 5px;border-radius:8px;place-items:center;font-size:13px}.page-nav a[aria-current="page"],.page-nav a:active{background:#e1f5eb;color:#087d56}.layout{margin:25px 16px 65px;grid-template-columns:minmax(0,1fr);gap:18px}.sidebar{padding:16px;overflow:hidden}.board-list{display:flex;max-width:100%;padding-bottom:4px;overflow-x:auto}.board-button{width:auto;min-width:max-content;white-space:nowrap}.content{min-width:0;padding:18px}.content-head{align-items:center}.search-form{display:grid;grid-template-columns:1fr 1fr;gap:8px}.search-form input,.search-form .symbol-filter{width:100%;min-width:0;grid-column:1/-1}.search-form select,.search-form button{width:100%}.article-row{grid-template-columns:minmax(0,1fr);gap:8px}.article-date{display:none}.modal{width:100%;max-height:calc(100dvh - 24px);padding:24px 18px}.detail-title{font-size:23px}.detail-content{min-height:130px}.detail-actions{flex-wrap:wrap}.comment-form{flex-direction:column}.comment-form .primary{align-self:flex-end}.editor textarea{min-height:170px}.pagination{max-width:100%;overflow-x:auto;justify-content:flex-start}.page-button{flex:0 0 auto}
        }
        @media(max-width:760px){
            .detail-images { grid-template-columns:1fr; }
            .detail-images img { grid-column:1; }
        }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">B</span>BullBoard</a>
    <nav class="page-nav" aria-label="주요 메뉴"><a href="/#markets">시장</a><a href="/mypage">내 페이지</a><a href="/posts" aria-current="page">커뮤니티</a></nav>
</header>

<main class="layout">
    <aside class="sidebar">
        <h2>게시판</h2>
        <div class="board-list" id="boardList"></div>
    </aside>

    <section class="content">
        <div class="content-head">
            <div><p class="eyebrow">COMMUNITY</p><h1 id="boardTitle">게시글</h1></div>
            <button class="primary" id="writeButton">글쓰기</button>
        </div>
        <form class="search-form" id="searchForm">
            <input class="symbol-filter" id="symbolFilter" maxlength="10" placeholder="종목 심볼" aria-label="종목 심볼 필터">
            <input id="searchInput" type="search" maxlength="100" placeholder="제목 또는 내용 검색" aria-label="게시글 검색">
            <select id="sortSelect" aria-label="게시글 정렬">
                <option value="latest">최신순</option>
                <option value="views">조회순</option>
            </select>
            <button type="submit">검색</button>
        </form>
        <div class="article-list" id="articleList"></div>
        <nav class="pagination" id="pagination" aria-label="게시글 페이지"></nav>
    </section>
</main>

<div class="overlay" id="detailOverlay">
    <article class="modal">
        <button class="close" data-close="detailOverlay">×</button>
        <p class="eyebrow" id="detailBoard"></p>
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-images" id="detailImages"></div>
        <div class="detail-content" id="detailContent"></div>
        <div class="detail-actions" id="detailActions"></div>
        <section class="comments">
            <h3>댓글 <span id="commentCount">0</span></h3>
            <div class="comment-list" id="commentList"></div>
            <form class="comment-form" id="commentForm">
                <textarea id="commentInput" maxlength="1000" required placeholder="댓글을 입력하세요"></textarea>
                <button class="primary" type="submit">등록</button>
            </form>
        </section>
    </article>
</div>

<div class="overlay" id="editorOverlay">
    <form class="modal editor" id="editorForm">
        <button class="close" type="button" data-close="editorOverlay">×</button>
        <h2 id="editorTitle">게시글 작성</h2>
        <label>게시판<select id="editorBoard" required></select></label>
        <label>종목 심볼 (선택)<input id="editorSymbol" maxlength="10" placeholder="예: NVDA, AAPL"></label>
        <label>제목<input id="editorArticleTitle" maxlength="200" required placeholder="제목을 입력하세요"></label>
        <label>내용<textarea id="editorContent" maxlength="10000" required placeholder="내용을 입력하세요 (최대 10,000자)"></textarea></label>
        <label>사진
            <span class="image-help">JPG, PNG, WebP · 한 장당 5MB 이하 · 최대 3장</span>
            <input id="editorImages" type="file" accept="image/jpeg,image/png,image/webp" multiple>
        </label>
        <div class="image-preview" id="imagePreview"></div>
        <div class="editor-actions">
            <button class="secondary" type="button" data-close="editorOverlay">취소</button>
            <button class="primary" type="submit">저장</button>
        </div>
    </form>
</div>

<div class="toast" id="toast"></div>

<script>
    const state={boards:[],articles:[],comments:[],selectedBoardId:null,keyword:'',symbol:'',sort:'latest',pageInfo:null,editingId:null,currentArticle:null,pendingImages:[],existingImages:[],uploading:false,editorSession:0};
    const boardList=document.getElementById('boardList'),articleList=document.getElementById('articleList'),toast=document.getElementById('toast');
    const showToast=message=>{toast.textContent=message;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2600)};
    const formatDate=value=>new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(new Date(value));
    const open=id=>document.getElementById(id).classList.add('visible');
    const close=id=>{document.getElementById(id).classList.remove('visible');if(id==='editorOverlay'){state.editorSession++;discardPendingImages()}};
    document.querySelectorAll('[data-close]').forEach(button=>button.addEventListener('click',()=>close(button.dataset.close)));
    document.querySelectorAll('.overlay').forEach(overlay=>overlay.addEventListener('click',event=>{if(event.target===overlay)close(overlay.id)}));

    async function api(url,options={}){
        const response=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(options.headers||{})}});
        if(!response.ok){
            const messages={400:'입력 내용을 확인해 주세요.',401:'로그인 후 이용해 주세요.',403:'본인의 게시글만 변경할 수 있습니다.',404:'대상을 찾을 수 없습니다.'};
            throw new Error(messages[response.status]||'요청 처리에 실패했습니다.');
        }
        return response.status===204?null:response.json();
    }

    async function loadBoards(){
        state.boards=await api('/boards');
        boardList.replaceChildren();
        const select=document.getElementById('editorBoard');select.replaceChildren();
        if(!state.boards.length){
            boardList.textContent='등록된 게시판이 없습니다.';
            articleList.innerHTML='<div class="empty">게시판을 먼저 생성해 주세요.</div>';
            document.getElementById('writeButton').disabled=true;
            return;
        }
        state.boards.forEach(board=>{
            const button=document.createElement('button');button.className='board-button';button.textContent=board.name;
            button.addEventListener('click',()=>changeBoard(board.id));boardList.append(button);
            const option=document.createElement('option');option.value=board.id;option.textContent=board.name;select.append(option);
        });
        const query=new URLSearchParams(location.search),queryBoard=Number(query.get('boardId')),queryPage=Math.max(Number(query.get('page'))||0,0),queryKeyword=(query.get('keyword')||'').slice(0,100),querySymbol=(query.get('symbol')||'').slice(0,10).toUpperCase(),querySort=query.get('sort')==='views'?'views':'latest',queryArticleId=Number(query.get('articleId')),shouldOpenWriter=query.get('write')==='true';
        state.keyword=queryKeyword;state.symbol=querySymbol;state.sort=querySort;document.getElementById('searchInput').value=queryKeyword;document.getElementById('symbolFilter').value=querySymbol;document.getElementById('sortSelect').value=querySort;
        await selectBoard(state.boards.some(board=>board.id===queryBoard)?queryBoard:state.boards[0].id,queryPage,queryKeyword,querySymbol);
        if(queryArticleId>0)await showDetail(queryArticleId);
        if(shouldOpenWriter)openEditor();
    }

    function changeBoard(boardId){state.keyword='';state.symbol='';document.getElementById('searchInput').value='';document.getElementById('symbolFilter').value='';return selectBoard(boardId,0,'','')}

    async function selectBoard(boardId,page=0,keyword=state.keyword,symbol=state.symbol){
        state.selectedBoardId=boardId;
        state.keyword=(keyword||'').trim().slice(0,100);
        state.symbol=(symbol||'').trim().slice(0,10).toUpperCase();
        const board=state.boards.find(item=>item.id===boardId);
        document.getElementById('boardTitle').textContent=board.name;
        document.querySelectorAll('.board-button').forEach((button,index)=>button.classList.toggle('active',state.boards[index].id===boardId));
        const keywordQuery=state.keyword?`&keyword=${encodeURIComponent(state.keyword)}`:'',symbolQuery=state.symbol?`&symbol=${encodeURIComponent(state.symbol)}`:'',sortQuery=`&sort=${state.sort}`;
        const pageResponse=await api(`/articles?boardId=${boardId}${keywordQuery}${symbolQuery}${sortQuery}&page=${Math.max(page,0)}&size=20`);
        if(!pageResponse.content.length&&page>0&&pageResponse.total_pages>0){return selectBoard(boardId,pageResponse.total_pages-1,state.keyword,state.symbol)}
        state.pageInfo=pageResponse;state.articles=pageResponse.content;
        history.replaceState(null,'',`/posts?boardId=${boardId}&page=${pageResponse.page}${keywordQuery}${symbolQuery}${sortQuery}`);
        renderArticles();renderPagination();
    }

    document.getElementById('searchForm').addEventListener('submit',event=>{event.preventDefault();selectBoard(state.selectedBoardId,0,document.getElementById('searchInput').value,document.getElementById('symbolFilter').value)});
    document.getElementById('sortSelect').addEventListener('change',event=>{state.sort=event.target.value;selectBoard(state.selectedBoardId,0,state.keyword,state.symbol)});

    function renderArticles(){
        articleList.replaceChildren();
        if(!state.articles.length){articleList.innerHTML=`<div class="empty">${state.keyword?'검색 결과가 없습니다.':'첫 번째 게시글을 작성해 보세요.'}</div>`;return}
        state.articles.forEach(article=>{
            const button=document.createElement('button');button.className='article-row';
            const summary=document.createElement('span');
            const title=document.createElement('span');title.className='article-title';if(article.symbol){const symbol=document.createElement('span');symbol.className='symbol-tag';symbol.textContent=article.symbol;title.append(symbol)}title.append(document.createTextNode(article.title));
            const meta=document.createElement('span');meta.className='article-meta';meta.textContent=`${article.author_nickname} · 조회 ${article.view_count}`;
            const date=document.createElement('span');date.className='article-date';date.textContent=formatDate(article.created_date);
            summary.append(title,meta);button.append(summary,date);button.addEventListener('click',()=>showDetail(article.id));articleList.append(button);
        });
    }

    function renderPagination(){
        const pagination=document.getElementById('pagination');pagination.replaceChildren();
        const info=state.pageInfo;if(!info||info.total_pages<=1)return;
        const addButton=(label,page,disabled=false,active=false)=>{const button=document.createElement('button');button.className='page-button'+(active?' active':'');button.textContent=label;button.disabled=disabled;button.addEventListener('click',()=>selectBoard(state.selectedBoardId,page));pagination.append(button)};
        addButton('이전',info.page-1,info.first);
        const start=Math.max(0,Math.min(info.page-2,info.total_pages-5)),end=Math.min(info.total_pages,start+5);
        for(let page=start;page<end;page++)addButton(String(page+1),page,false,page===info.page);
        addButton('다음',info.page+1,info.last);
    }

    async function showDetail(id){
        const article=await api(`/articles/${id}`);state.currentArticle=article;
        document.getElementById('detailBoard').textContent=article.symbol?`${article.board_name} · ${article.symbol}`:article.board_name;
        document.getElementById('detailTitle').textContent=article.title;
        renderDetailImages(article.images||[]);
        renderDetailMeta(article);
        document.getElementById('detailContent').textContent=article.content;
        const actions=document.getElementById('detailActions');actions.replaceChildren();
        const likeState=await api(`/articles/${article.id}/likes`);renderLikeAction(actions,article.id,likeState);
        if(article.editable){
            const edit=document.createElement('button');edit.className='secondary';edit.textContent='수정';edit.addEventListener('click',()=>openEditor(article));
            const remove=document.createElement('button');remove.className='danger';remove.textContent='삭제';remove.addEventListener('click',deleteCurrentArticle);
            actions.append(edit,remove);
        }
        await loadComments(article.id);
        open('detailOverlay');
    }

    function renderDetailImages(images){
        const container=document.getElementById('detailImages');container.replaceChildren();
        images.forEach(image=>{
            const element=document.createElement('img');
            element.src=image.url;element.alt=image.original_name;element.loading='lazy';
            container.append(element);
        });
    }

    function renderDetailMeta(article){
        const meta=document.getElementById('detailMeta');meta.replaceChildren();
        if(article.author_id){
            const author=document.createElement('a');
            author.className='detail-author';
            author.href=`/profile/${article.author_id}`;
            author.textContent=article.author_nickname;
            meta.append(author);
        }else{
            const author=document.createElement('span');
            author.textContent=article.author_nickname;
            meta.append(author);
        }
        meta.append(document.createTextNode(
                ` · 조회 ${article.view_count} · ${formatDate(article.created_date)}`
        ));
    }

    async function loadComments(articleId){
        state.comments=await api(`/articles/${articleId}/comments`);
        document.getElementById('commentCount').textContent=state.comments.length;
        const list=document.getElementById('commentList');list.replaceChildren();
        if(!state.comments.length){list.innerHTML='<div class="article-meta">첫 댓글을 작성해 보세요.</div>';return}
        state.comments.forEach(comment=>{
            const item=document.createElement('article');item.className='comment';
            const head=document.createElement('div');head.className='comment-head';
            const author=document.createElement('strong');author.textContent=comment.author_nickname;
            const date=document.createElement('span');date.textContent=formatDate(comment.created_date);head.append(author,date);
            const content=document.createElement('p');content.className='comment-content';content.textContent=comment.content;
            item.append(head,content);
            if(comment.editable){const actions=document.createElement('div');actions.className='comment-actions';const edit=document.createElement('button');edit.textContent='수정';edit.addEventListener('click',()=>startCommentEdit(comment,item));const remove=document.createElement('button');remove.textContent='삭제';remove.addEventListener('click',()=>deleteComment(comment.id));actions.append(edit,remove);item.append(actions)}
            list.append(item);
        });
    }

    document.getElementById('commentForm').addEventListener('submit',async event=>{
        event.preventDefault();if(!state.currentArticle)return;
        const input=document.getElementById('commentInput'),content=input.value.trim();if(!content)return;
        try{await api(`/articles/${state.currentArticle.id}/comments`,{method:'POST',body:JSON.stringify({content})});input.value='';showToast('댓글이 등록되었습니다.');await loadComments(state.currentArticle.id)}catch(error){showToast(error.message)}
    });

    function startCommentEdit(comment,item){
        const current=item.querySelector('.comment-content'),oldActions=item.querySelector('.comment-actions');
        const textarea=document.createElement('textarea');textarea.className='comment-edit';textarea.maxLength=1000;textarea.value=comment.content;
        const actions=document.createElement('div');actions.className='comment-actions';
        const cancel=document.createElement('button');cancel.type='button';cancel.textContent='취소';cancel.addEventListener('click',()=>loadComments(state.currentArticle.id));
        const save=document.createElement('button');save.type='button';save.textContent='저장';save.addEventListener('click',async()=>{const content=textarea.value.trim();if(!content){showToast('댓글 내용을 입력해 주세요.');return}try{await api(`/comments/${comment.id}`,{method:'PUT',body:JSON.stringify({content})});showToast('댓글이 수정되었습니다.');await loadComments(state.currentArticle.id)}catch(error){showToast(error.message)}});
        current.replaceWith(textarea);oldActions.replaceWith(actions);actions.append(cancel,save);textarea.focus();
    }

    async function deleteComment(id){
        if(!confirm('댓글을 삭제하시겠습니까?'))return;
        try{await api(`/comments/${id}`,{method:'DELETE'});showToast('댓글이 삭제되었습니다.');await loadComments(state.currentArticle.id)}catch(error){showToast(error.message)}
    }

    function renderLikeAction(container,articleId,likeState){
        const button=document.createElement('button');button.className='secondary';button.textContent=`${likeState.liked?'♥':'♡'} 좋아요 ${likeState.like_count}`;
        button.addEventListener('click',async()=>{try{const next=await api(`/articles/${articleId}/likes`,{method:likeState.liked?'DELETE':'POST'});renderLikeAction(container,articleId,next);button.remove()}catch(error){showToast(error.message)}});
        container.prepend(button);
    }

    function clearPendingImages(){
        state.pendingImages.forEach(image=>URL.revokeObjectURL(image.previewUrl));
        state.pendingImages=[];
    }

    function discardPendingImages(){
        const pending=[...state.pendingImages];
        clearPendingImages();
        pending.forEach(image=>api(
                `/article-images/uploads?objectKey=${encodeURIComponent(image.objectKey)}`,
                {method:'DELETE'}
        ).catch(()=>{}));
        const preview=document.getElementById('imagePreview');
        if(preview)renderImagePreview();
    }

    function renderImagePreview(){
        const preview=document.getElementById('imagePreview');preview.replaceChildren();
        state.existingImages.forEach(image=>preview.append(createPreviewItem(
                image.url,image.original_name,async()=>{
                    if(!confirm('이 사진을 삭제하시겠습니까?'))return;
                    try{
                        await api(`/article-images/${image.id}`,{method:'DELETE'});
                        state.existingImages=state.existingImages.filter(item=>item.id!==image.id);
                        renderImagePreview();
                    }catch(error){showToast(error.message)}
                }
        )));
        state.pendingImages.forEach(image=>preview.append(createPreviewItem(
                image.previewUrl,image.file.name,async()=>{
                    try{
                        await api(`/article-images/uploads?objectKey=${encodeURIComponent(image.objectKey)}`,{method:'DELETE'});
                        URL.revokeObjectURL(image.previewUrl);
                        state.pendingImages=state.pendingImages.filter(item=>item!==image);
                        renderImagePreview();
                    }catch(error){showToast(error.message)}
                }
        )));
    }

    function createPreviewItem(src,alt,onRemove){
        const item=document.createElement('div');item.className='image-preview-item';
        const image=document.createElement('img');image.src=src;image.alt=alt;
        const remove=document.createElement('button');remove.type='button';remove.textContent='×';
        remove.setAttribute('aria-label','사진 삭제');remove.addEventListener('click',onRemove);
        item.append(image,remove);return item;
    }

    document.getElementById('editorImages').addEventListener('change',async event=>{
        const files=[...event.target.files];event.target.value='';
        const editorSession=state.editorSession;
        if(state.existingImages.length+state.pendingImages.length+files.length>3){
            showToast('사진은 최대 3장까지 등록할 수 있습니다.');return;
        }
        state.uploading=true;
        try{
            for(const file of files){
                if(!['image/jpeg','image/png','image/webp'].includes(file.type)||file.size<1||file.size>5*1024*1024){
                    throw new Error('JPG, PNG, WebP 파일만 장당 5MB까지 등록할 수 있습니다.');
                }
                const upload=await api('/article-images/presigned-url',{
                    method:'POST',
                    body:JSON.stringify({
                        original_file_name:file.name,
                        content_type:file.type,
                        file_size:file.size
                    })
                });
                const response=await fetch(upload.upload_url,{
                    method:'PUT',headers:upload.headers,body:file
                });
                if(!response.ok)throw new Error('사진 업로드에 실패했습니다.');
                if(editorSession!==state.editorSession){
                    await api(`/article-images/uploads?objectKey=${encodeURIComponent(upload.object_key)}`,{method:'DELETE'});
                    continue;
                }
                state.pendingImages.push({
                    objectKey:upload.object_key,
                    previewUrl:URL.createObjectURL(file),
                    file
                });
                renderImagePreview();
            }
        }catch(error){showToast(error.message)}
        finally{state.uploading=false}
    });

    function openEditor(article=null){
        clearPendingImages();
        state.editorSession++;
        state.editingId=article?.id||null;
        state.existingImages=[...(article?.images||[])];
        document.getElementById('editorTitle').textContent=article?'게시글 수정':'게시글 작성';
        document.getElementById('editorBoard').value=article?.board_id||state.selectedBoardId;
        document.getElementById('editorSymbol').value=article?.symbol||'';
        document.getElementById('editorArticleTitle').value=article?.title||'';
        document.getElementById('editorContent').value=article?.content||'';
        document.getElementById('editorImages').value='';
        renderImagePreview();
        close('detailOverlay');open('editorOverlay');
    }

    document.getElementById('writeButton').addEventListener('click',()=>openEditor());
    document.getElementById('editorForm').addEventListener('submit',async event=>{
        event.preventDefault();
        if(state.uploading){showToast('사진 업로드가 끝날 때까지 잠시 기다려 주세요.');return}
        const body=JSON.stringify({board_id:Number(document.getElementById('editorBoard').value),symbol:document.getElementById('editorSymbol').value.trim().toUpperCase(),title:document.getElementById('editorArticleTitle').value.trim(),content:document.getElementById('editorContent').value.trim(),image_keys:state.pendingImages.map(image=>image.objectKey)});
        try{
            const article=await api(state.editingId?`/articles/${state.editingId}`:'/articles',{method:state.editingId?'PUT':'POST',body});
            clearPendingImages();
            close('editorOverlay');showToast(state.editingId?'게시글이 수정되었습니다.':'게시글이 작성되었습니다.');
            await selectBoard(article.board_id,0);await showDetail(article.id);
        }catch(error){showToast(error.message)}
    });

    async function deleteCurrentArticle(){
        if(!state.currentArticle||!confirm('게시글을 삭제하시겠습니까?'))return;
        try{await api(`/articles/${state.currentArticle.id}`,{method:'DELETE'});close('detailOverlay');showToast('게시글이 삭제되었습니다.');await selectBoard(state.selectedBoardId,state.pageInfo?.page||0)}catch(error){showToast(error.message)}
    }

    loadBoards().catch(error=>showToast(error.message));
</script>
</body>
</html>
