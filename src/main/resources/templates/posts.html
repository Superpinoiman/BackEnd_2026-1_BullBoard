<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BullBoard | 커뮤니티</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        :root { --ink:#12191b; --muted:#687376; --line:#dce3e0; --paper:#f7f8f6; --green:#12a974; --red:#e35c59; }
        * { box-sizing:border-box; }
        body { margin:0; background:var(--paper); color:var(--ink); font-family:Arial,sans-serif; }
        button,input,textarea,select { font:inherit; }
        button { cursor:pointer; }
        .topbar { height:76px; display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:auto; border-bottom:1px solid var(--line); }
        .brand { color:var(--ink); text-decoration:none; font-size:20px; font-weight:800; }
        .brand-mark { display:inline-grid; place-items:center; width:27px; height:27px; margin-right:7px; border-radius:8px; background:var(--green); color:#fff; font:italic 700 18px Georgia,serif; }
        .home-link { color:var(--muted); text-decoration:none; font-size:14px; font-weight:700; }
        .layout { max-width:1180px; margin:44px auto 80px; display:grid; grid-template-columns:230px 1fr; gap:34px; }
        .sidebar,.content { background:#fff; border:1px solid var(--line); border-radius:14px; }
        .sidebar { padding:22px; align-self:start; }
        .sidebar h2 { margin:0 0 17px; font-size:17px; }
        .board-list { display:grid; gap:7px; }
        .board-button { width:100%; padding:11px 12px; border:0; border-radius:8px; background:transparent; color:var(--muted); text-align:left; }
        .board-button.active { background:#e1f5eb; color:#087d56; font-weight:800; }
        .content { min-height:560px; padding:30px; }
        .content-head { display:flex; justify-content:space-between; gap:20px; align-items:end; padding-bottom:22px; border-bottom:1px solid var(--line); }
        .eyebrow { margin:0 0 8px; color:var(--green); font-size:11px; font-weight:800; letter-spacing:1.4px; }
        h1 { margin:0; font-size:29px; }
        .primary { border:0; border-radius:8px; padding:11px 17px; background:var(--green); color:#fff; font-weight:800; }
        .search-form { display:flex; gap:8px; padding:18px 0 4px; }
        .search-form input { flex:1; min-width:0; padding:11px 13px; border:1px solid var(--line); border-radius:8px; }
        .search-form select { padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; }
        .search-form button { padding:10px 16px; border:1px solid var(--line); border-radius:8px; background:#fff; font-weight:800; }
        .article-list { display:grid; }
        .article-row { display:grid; grid-template-columns:1fr auto; gap:18px; width:100%; padding:19px 4px; border:0; border-bottom:1px solid var(--line); background:transparent; text-align:left; }
        .article-row:hover { color:#087d56; }
        .article-title { display:block; margin-bottom:7px; font-size:16px; font-weight:800; }
        .article-meta,.article-date { color:var(--muted); font-size:12px; }
        .empty { padding:90px 20px; color:var(--muted); text-align:center; }
        .pagination { display:flex; justify-content:center; gap:6px; padding-top:24px; }
        .page-button { min-width:36px; height:36px; border:1px solid var(--line); border-radius:7px; background:#fff; color:var(--muted); }
        .page-button.active { border-color:var(--green); background:var(--green); color:#fff; font-weight:800; }
        .page-button:disabled { opacity:.4; cursor:not-allowed; }
        .overlay { position:fixed; inset:0; display:none; place-items:center; padding:20px; background:#0c1614a6; z-index:20; }
        .overlay.visible { display:grid; }
        .modal { width:min(100%,650px); max-height:90vh; overflow:auto; padding:30px; border-radius:16px; background:#fff; position:relative; }
        .close { position:absolute; right:15px; top:12px; border:0; background:transparent; color:var(--muted); font-size:27px; }
        .detail-title { margin:7px 35px 10px 0; font-size:26px; }
        .detail-meta { padding-bottom:18px; border-bottom:1px solid var(--line); color:var(--muted); font-size:13px; }
        .detail-content { min-height:190px; padding:24px 0; line-height:1.75; white-space:pre-wrap; }
        .detail-actions { display:flex; justify-content:flex-end; gap:8px; }
        .secondary,.danger { padding:9px 14px; border:1px solid var(--line); border-radius:7px; background:#fff; font-weight:700; }
        .danger { border-color:#f1c3c2; color:var(--red); }
        .editor { display:grid; gap:16px; }
        .editor h2 { margin:0 0 4px; }
        .editor label { display:grid; gap:7px; font-size:12px; font-weight:800; }
        .editor input,.editor textarea,.editor select { padding:12px; border:1px solid var(--line); border-radius:8px; background:#fff; }
        .editor textarea { min-height:220px; resize:vertical; }
        .editor-actions { display:flex; justify-content:flex-end; gap:8px; }
        .toast { position:fixed; left:50%; bottom:25px; opacity:0; transform:translate(-50%,20px); padding:12px 17px; border-radius:8px; background:#172424; color:#fff; font-size:13px; transition:.2s; pointer-events:none; z-index:30; }
        .toast.show { opacity:1; transform:translate(-50%,0); }
        @media(max-width:760px){ .topbar{padding:0 20px}.layout{margin:25px 20px;grid-template-columns:1fr}.sidebar{overflow:auto}.board-list{display:flex}.board-button{white-space:nowrap}.content{padding:21px}.article-row{grid-template-columns:1fr}.article-date{display:none} }
    </style>
</head>
<body>
<header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">B</span>BullBoard</a>
    <a class="home-link" href="/">홈으로</a>
</header>

<main class="layout">
    <aside class="sidebar">
        <h2>게시판</h2>
        <div class="board-list" id="boardList"></div>
    </aside>

    <section class="content">
        <div class="content-head">
            <div><p class="eyebrow">COMMUNITY</p><h1 id="boardTitle">게시글</h1></div>
            <button class="primary" id="writeButton">글쓰기</button>
        </div>
        <form class="search-form" id="searchForm">
            <input id="searchInput" type="search" maxlength="100" placeholder="제목 또는 내용 검색" aria-label="게시글 검색">
            <select id="sortSelect" aria-label="게시글 정렬">
                <option value="latest">최신순</option>
                <option value="views">조회순</option>
            </select>
            <button type="submit">검색</button>
        </form>
        <div class="article-list" id="articleList"></div>
        <nav class="pagination" id="pagination" aria-label="게시글 페이지"></nav>
    </section>
</main>

<div class="overlay" id="detailOverlay">
    <article class="modal">
        <button class="close" data-close="detailOverlay">×</button>
        <p class="eyebrow" id="detailBoard"></p>
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-content" id="detailContent"></div>
        <div class="detail-actions" id="detailActions"></div>
    </article>
</div>

<div class="overlay" id="editorOverlay">
    <form class="modal editor" id="editorForm">
        <button class="close" type="button" data-close="editorOverlay">×</button>
        <h2 id="editorTitle">게시글 작성</h2>
        <label>게시판<select id="editorBoard" required></select></label>
        <label>제목<input id="editorArticleTitle" maxlength="200" required placeholder="제목을 입력하세요"></label>
        <label>내용<textarea id="editorContent" required placeholder="내용을 입력하세요"></textarea></label>
        <div class="editor-actions">
            <button class="secondary" type="button" data-close="editorOverlay">취소</button>
            <button class="primary" type="submit">저장</button>
        </div>
    </form>
</div>

<div class="toast" id="toast"></div>

<script>
    const state={boards:[],articles:[],selectedBoardId:null,keyword:'',sort:'latest',pageInfo:null,editingId:null,currentArticle:null};
    const boardList=document.getElementById('boardList'),articleList=document.getElementById('articleList'),toast=document.getElementById('toast');
    const showToast=message=>{toast.textContent=message;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2600)};
    const formatDate=value=>new Intl.DateTimeFormat('ko-KR',{dateStyle:'medium',timeStyle:'short'}).format(new Date(value));
    const open=id=>document.getElementById(id).classList.add('visible');
    const close=id=>document.getElementById(id).classList.remove('visible');
    document.querySelectorAll('[data-close]').forEach(button=>button.addEventListener('click',()=>close(button.dataset.close)));
    document.querySelectorAll('.overlay').forEach(overlay=>overlay.addEventListener('click',event=>{if(event.target===overlay)close(overlay.id)}));

    async function api(url,options={}){
        const response=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(options.headers||{})}});
        if(!response.ok){
            const messages={400:'입력 내용을 확인해 주세요.',401:'로그인 후 이용해 주세요.',403:'본인의 게시글만 변경할 수 있습니다.',404:'대상을 찾을 수 없습니다.'};
            throw new Error(messages[response.status]||'요청 처리에 실패했습니다.');
        }
        return response.status===204?null:response.json();
    }

    async function loadBoards(){
        state.boards=await api('/boards');
        boardList.replaceChildren();
        const select=document.getElementById('editorBoard');select.replaceChildren();
        if(!state.boards.length){
            boardList.textContent='등록된 게시판이 없습니다.';
            articleList.innerHTML='<div class="empty">게시판을 먼저 생성해 주세요.</div>';
            document.getElementById('writeButton').disabled=true;
            return;
        }
        state.boards.forEach(board=>{
            const button=document.createElement('button');button.className='board-button';button.textContent=board.name;
            button.addEventListener('click',()=>changeBoard(board.id));boardList.append(button);
            const option=document.createElement('option');option.value=board.id;option.textContent=board.name;select.append(option);
        });
        const query=new URLSearchParams(location.search),queryBoard=Number(query.get('boardId')),queryPage=Math.max(Number(query.get('page'))||0,0),queryKeyword=(query.get('keyword')||'').slice(0,100),querySort=query.get('sort')==='views'?'views':'latest';
        state.keyword=queryKeyword;state.sort=querySort;document.getElementById('searchInput').value=queryKeyword;document.getElementById('sortSelect').value=querySort;
        await selectBoard(state.boards.some(board=>board.id===queryBoard)?queryBoard:state.boards[0].id,queryPage,queryKeyword);
    }

    function changeBoard(boardId){state.keyword='';document.getElementById('searchInput').value='';return selectBoard(boardId,0,'')}

    async function selectBoard(boardId,page=0,keyword=state.keyword){
        state.selectedBoardId=boardId;
        state.keyword=(keyword||'').trim().slice(0,100);
        const board=state.boards.find(item=>item.id===boardId);
        document.getElementById('boardTitle').textContent=board.name;
        document.querySelectorAll('.board-button').forEach((button,index)=>button.classList.toggle('active',state.boards[index].id===boardId));
        const keywordQuery=state.keyword?`&keyword=${encodeURIComponent(state.keyword)}`:'',sortQuery=`&sort=${state.sort}`;
        const pageResponse=await api(`/articles?boardId=${boardId}${keywordQuery}${sortQuery}&page=${Math.max(page,0)}&size=20`);
        if(!pageResponse.content.length&&page>0&&pageResponse.total_pages>0){return selectBoard(boardId,pageResponse.total_pages-1,state.keyword)}
        state.pageInfo=pageResponse;state.articles=pageResponse.content;
        history.replaceState(null,'',`/posts?boardId=${boardId}&page=${pageResponse.page}${keywordQuery}${sortQuery}`);
        renderArticles();renderPagination();
    }

    document.getElementById('searchForm').addEventListener('submit',event=>{event.preventDefault();selectBoard(state.selectedBoardId,0,document.getElementById('searchInput').value)});
    document.getElementById('sortSelect').addEventListener('change',event=>{state.sort=event.target.value;selectBoard(state.selectedBoardId,0,state.keyword)});

    function renderArticles(){
        articleList.replaceChildren();
        if(!state.articles.length){articleList.innerHTML=`<div class="empty">${state.keyword?'검색 결과가 없습니다.':'첫 번째 게시글을 작성해 보세요.'}</div>`;return}
        state.articles.forEach(article=>{
            const button=document.createElement('button');button.className='article-row';
            const summary=document.createElement('span');
            const title=document.createElement('span');title.className='article-title';title.textContent=article.title;
            const meta=document.createElement('span');meta.className='article-meta';meta.textContent=`${article.author_nickname} · 조회 ${article.view_count}`;
            const date=document.createElement('span');date.className='article-date';date.textContent=formatDate(article.created_date);
            summary.append(title,meta);button.append(summary,date);button.addEventListener('click',()=>showDetail(article.id));articleList.append(button);
        });
    }

    function renderPagination(){
        const pagination=document.getElementById('pagination');pagination.replaceChildren();
        const info=state.pageInfo;if(!info||info.total_pages<=1)return;
        const addButton=(label,page,disabled=false,active=false)=>{const button=document.createElement('button');button.className='page-button'+(active?' active':'');button.textContent=label;button.disabled=disabled;button.addEventListener('click',()=>selectBoard(state.selectedBoardId,page));pagination.append(button)};
        addButton('이전',info.page-1,info.first);
        const start=Math.max(0,Math.min(info.page-2,info.total_pages-5)),end=Math.min(info.total_pages,start+5);
        for(let page=start;page<end;page++)addButton(String(page+1),page,false,page===info.page);
        addButton('다음',info.page+1,info.last);
    }

    async function showDetail(id){
        const article=await api(`/articles/${id}`);state.currentArticle=article;
        document.getElementById('detailBoard').textContent=article.board_name;
        document.getElementById('detailTitle').textContent=article.title;
        document.getElementById('detailMeta').textContent=`${article.author_nickname} · 조회 ${article.view_count} · ${formatDate(article.created_date)}`;
        document.getElementById('detailContent').textContent=article.content;
        const actions=document.getElementById('detailActions');actions.replaceChildren();
        if(article.editable){
            const edit=document.createElement('button');edit.className='secondary';edit.textContent='수정';edit.addEventListener('click',()=>openEditor(article));
            const remove=document.createElement('button');remove.className='danger';remove.textContent='삭제';remove.addEventListener('click',deleteCurrentArticle);
            actions.append(edit,remove);
        }
        open('detailOverlay');
    }

    function openEditor(article=null){
        state.editingId=article?.id||null;
        document.getElementById('editorTitle').textContent=article?'게시글 수정':'게시글 작성';
        document.getElementById('editorBoard').value=article?.board_id||state.selectedBoardId;
        document.getElementById('editorArticleTitle').value=article?.title||'';
        document.getElementById('editorContent').value=article?.content||'';
        close('detailOverlay');open('editorOverlay');
    }

    document.getElementById('writeButton').addEventListener('click',()=>openEditor());
    document.getElementById('editorForm').addEventListener('submit',async event=>{
        event.preventDefault();
        const body=JSON.stringify({board_id:Number(document.getElementById('editorBoard').value),title:document.getElementById('editorArticleTitle').value.trim(),content:document.getElementById('editorContent').value.trim()});
        try{
            const article=await api(state.editingId?`/articles/${state.editingId}`:'/articles',{method:state.editingId?'PUT':'POST',body});
            close('editorOverlay');showToast(state.editingId?'게시글이 수정되었습니다.':'게시글이 작성되었습니다.');
            await selectBoard(article.board_id,0);await showDetail(article.id);
        }catch(error){showToast(error.message)}
    });

    async function deleteCurrentArticle(){
        if(!state.currentArticle||!confirm('게시글을 삭제하시겠습니까?'))return;
        try{await api(`/articles/${state.currentArticle.id}`,{method:'DELETE'});close('detailOverlay');showToast('게시글이 삭제되었습니다.');await selectBoard(state.selectedBoardId,state.pageInfo?.page||0)}catch(error){showToast(error.message)}
    }

    loadBoards().catch(error=>showToast(error.message));
</script>
</body>
</html>
